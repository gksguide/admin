<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود ادمین</title>
    <link rel="stylesheet" href="auth.css">
    <style>
        .admin-badge {
            text-align: center;
            margin-bottom: 20px;
            font-size: 40px;
        }
        .error-msg {
            color: red;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="auth-box">

    <div class="admin-badge">🔐</div>
    <h1>پنل ادمین</h1>

    <div class="error-msg" id="errorMsg">
        ایمیل یا رمز عبور اشتباه است
    </div>

    <input type="email" id="email" placeholder="ایمیل ادمین">
    <input type="password" id="password" placeholder="رمز عبور">

    <button onclick="adminLogin()">ورود</button>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC1X6kF1ZKx9lA59RhRXCo0R93yLqcPnPE",
        authDomain: "gks-migration.firebaseapp.com",
        projectId: "gks-migration",
        storageBucket: "gks-migration.firebasestorage.app",
        messagingSenderId: "1062568689916",
        appId: "1:1062568689916:web:d081cc2d34946b4d225779"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ادمین ایمیل - همون ایمیلی که تو Firebase ساختی
    const ADMIN_EMAIL = "gksguide101@gmail.com";

    window.adminLogin = async function() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMsg");

        // فقط ادمین اجازه ورود داره
        if(email !== ADMIN_EMAIL) {
            errorMsg.style.display = "block";
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // ورود موفق - رفتن به داشبورد
            window.location.href = "admin.html";
        } catch(error) {
            errorMsg.style.display = "block";
        }
    }
</script>

</body>
</html>
